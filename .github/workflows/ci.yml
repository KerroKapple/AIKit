name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 PR 多次推送时取消旧 run，省 Actions 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          # 启动期校验需要这个 key 存在；CI 仅用占位符，不调用真实 API
          DASHSCOPE_API_KEY: ci-placeholder-not-used
        run: npm run build
